<nav class="site-nav" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="CPDSE Home">
      <img src="{{ '/assets/logo_wide_gold.svg' | relative_url }}" alt="Center for Pharmaceutical Data Science Education" height="36">
    </a>

    <ul class="nav-links" id="nav-links">
      {% for item in site.nav %}
        {% if item.children %}
          <li>
            <button aria-haspopup="true" aria-expanded="false">{{ item.title }}</button>
            <div class="dropdown" role="menu">
              {% for child in item.children %}
                <a {% if child.external %}class="is-external" href="{{ child.url }}" target="_blank" rel="noopener"{% else %}href="{{ child.url | relative_url }}"{% endif %} role="menuitem">{{ child.title }}</a>
              {% endfor %}
            </div>
          </li>
        {% else %}
          <li>
            <a {% if item.external %}class="is-external{% if page.url == item.url %} active{% endif %}" href="{{ item.url }}" target="_blank" rel="noopener"{% else %}{% if page.url == item.url %}class="active"{% endif %} href="{{ item.url | relative_url }}"{% endif %}>{{ item.title }}</a>
          </li>
        {% endif %}
      {% endfor %}
    </ul>

    <div class="nav-socials">
      <a href="{{ site.socials.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6.94 8.5H3.56V20h3.38V8.5Zm.22-3.56c0-1.1-.82-1.94-1.92-1.94s-1.92.84-1.92 1.94c0 1.08.8 1.94 1.88 1.94h.02c1.12 0 1.94-.86 1.94-1.94Zm12.84 8.48c0-3.5-1.86-5.12-4.34-5.12-2 0-2.9 1.1-3.4 1.88V8.5h-3.38c.04 1.12 0 11.5 0 11.5h3.38v-6.42c0-.34.02-.68.12-.92.26-.68.86-1.38 1.86-1.38 1.32 0 1.84 1 1.84 2.48V20H20v-6.58Z"/>
        </svg>
      </a>
      <a href="{{ site.socials.instagram }}" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9a5.5 5.5 0 0 1-5.5 5.5h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Zm0 2A3.5 3.5 0 0 0 4 7.5v9A3.5 3.5 0 0 0 7.5 20h9a3.5 3.5 0 0 0 3.5-3.5v-9A3.5 3.5 0 0 0 16.5 4h-9Zm10.25 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/>
        </svg>

          <path d="M12 .5A11.5 11.5 0 0 0 .5 12c0 5.08 3.29 9.38 7.85 10.9.57.1.78-.24.78-.54 0-.26-.01-.97-.02-1.9-3.2.7-3.88-1.38-3.88-1.38-.52-1.32-1.28-1.67-1.28-1.67-1.04-.7.08-.69.08-.69 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.67 1.24 3.33.95.1-.74.4-1.24.72-1.53-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.3 1.18-3.11-.12-.29-.51-1.47.11-3.07 0 0 .96-.31 3.15 1.19A10.9 10.9 0 0 1 12 6.1c.97 0 1.95.13 2.86.38 2.18-1.5 3.14-1.19 3.14-1.19.62 1.6.23 2.78.11 3.07.73.81 1.18 1.85 1.18 3.11 0 4.42-2.69 5.39-5.25 5.68.41.35.78 1.03.78 2.09 0 1.51-.01 2.72-.01 3.09 0 .3.2.64.79.53A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/>
        </svg>
      </a>
    </div>

    <button class="nav-hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');
  hamburger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', open);
  });
</script>
