---
layout: default
---

<header class="page-hero">
  <div class="container">
    {% if page.hero_label %}<span class="hero-label">{{ page.hero_label }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  </div>
</header>

<main class="page-body">
  {{ content }}
  {% if page.download_button %}
  <p>
    <a class="btn btn-primary" href="{{ page.download_button.file }}" download>{{ page.download_button.text }}</a>
  </p>
  {% endif %}
</main>
